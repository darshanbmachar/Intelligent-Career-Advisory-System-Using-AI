# Server Configuration
server.port=8080

# Spring AI - OpenAI-compatible configuration via OpenRouter.
# Set OPENROUTER_API_KEY to your OpenRouter key before starting the app.
spring.ai.openai.base-url=${OPENAI_BASE_URL:https://openrouter.ai/api}
spring.ai.openai.api-key=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
spring.ai.openai.chat.options.model=${OPENROUTER_CHAT_MODEL:${OPENAI_CHAT_MODEL:openai/gpt-4o-mini}}
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=4000

# Do not retry non-recoverable auth/quota/model errors repeatedly.
spring.ai.retry.max-attempts=1

# Request timeout configuration (in milliseconds)
spring.ai.openai.request-options.timeout=60000

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Logging
logging.level.com.careeradviser=DEBUG
logging.level.org.springframework.ai=DEBUG
